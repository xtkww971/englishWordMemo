<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영단어 학습 및 시험 시스템</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f8f9fa; padding-top: 30px; }
        .card { margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        .cursor-pointer { cursor: pointer; }
        .meaning-blur { filter: blur(5px); transition: filter 0.3s; }
        .meaning-blur:hover { filter: blur(0px); }
    </style>
</head>
<body>

<div class="container">
    <header class="pb-3 mb-4 border-bottom d-flex justify-content-center align-items-center cursor-pointer" onclick="showHome()">
        <h1 class="text-primary mb-0"><i class="bi bi-house-door-fill me-2"></i>My 영단어 플래너</h1>
    </header>

    <div id="home-view">
        <div class="row">
            <div class="col-md-12 mb-4">
                <div class="p-5 text-white bg-dark rounded-3 text-center">
                    <h2><i class="bi bi-lightning-charge-fill text-warning"></i> 전체 단어 챌린지</h2>
                    <p>MySQL에 등록된 모든 단어 중 무작위로 80개를 골라 통째로 시험을 봅니다.</p>
                    <button class="btn btn-outline-light btn-lg" type="button" onclick="startRandom80Exam()">지금 80개 시험보기</button>
                    <button class="btn btn-danger btn-lg fw-bold" type="button" onclick="loadWrongNotebook()">
                        <i class="bi bi-book-half me-1"></i> 틀린 단어 모음 (오답 노트)
                    </button>
                </div>
            </div>
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <strong><i class="bi bi-calendar3 me-2"></i>날짜별 단어장 선택</strong>
                    </div>
                    <div class="card-body">
                        <div id="date-list" class="list-group">
                            <p class="text-muted text-center">날짜 목록을 불러오는 중...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="study-view" class="hidden">
        <button class="btn btn-secondary mb-3" onclick="showHome()">
            <i class="bi bi-arrow-left-short"></i> 메인으로 돌아가기
        </button>
        <div class="card">
            <div id="study-card-header" class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                <h3 id="selected-date-title" class="mb-0">단어장</h3>
                <button id="btn-date-exam" class="btn btn-light btn-sm fw-bold">✏️ 이 날짜 단어 시험보기</button>
            </div>
            <div class="card-body">
                <table class="table table-striped text-center align-middle">
                    <thead>
                    <tr>
                        <th style="width: 30%;">단어 (Word)</th>
                        <th style="width: 50%;">뜻 (Meaning)</th>
                        <th style="width: 20%;">틀린 횟수 (MySQL)</th>
                    </tr>
                    </thead>
                    <tbody id="word-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="exam-view" class="hidden">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <button class="btn btn-secondary" onclick="showHome()"><i class="bi bi-x-lg"></i> 시험 중단하고 나가기</button>
            <h2 id="exam-title" class="text-warning mb-0">🔥 단어 시험지</h2>
            <button class="btn btn-danger btn-lg fw-bold" onclick="submitSelfGrading()"><i class="bi bi-check-all"></i> 채점 완료 및 제출</button>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="alert alert-info text-center">
                    <i class="bi bi-info-circle-fill"></i> 뜻을 적은 후, <strong>[정답 보기]</strong> 버튼을 눌러 본인이 틀린 단어의 체크박스를 체크하고 제출하세요!
                </div>

                <table class="table table-bordered text-center align-middle">
                    <thead class="table-light">
                    <tr>
                        <th style="width: 8%;">번호</th>
                        <th style="width: 30%;">단어 (Word)</th>
                        <th style="width: 35%;">나의 답안</th>
                        <th style="width: 27%;">정답 확인 / 채점</th>
                    </tr>
                    </thead>
                    <tbody id="exam-paper-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="/js/word-app.js"></script>
</body>
</html>
